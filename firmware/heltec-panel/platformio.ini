; PlatformIO config for Heltec WiFi LoRa 32 V3 (ESP32-S3)
;
; Build:  pio run
; Upload: pio run --target upload
; Monitor: pio device monitor
;
; Override WiFi/MQTT via build_flags (see below).

[env:heltec_v3]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200

; Libraries
lib_deps =
    heltec/Heltec ESP32 Dev-Boards@^1.1.2
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.5

; Build flags — uncomment and edit to set WiFi/MQTT without touching code:
build_flags =
    ; -DWIFI_SSID=\"YourSSID\"
    ; -DWIFI_PASS=\"YourPassword\"
    ; -DMQTT_BROKER=\"192.168.1.100\"
    ; -DMQTT_PORT=1883
    ; -DMQTT_TOPIC=\"ocd/panel\"
    ; -DMQTT_CLIENT_ID=\"ocd-heltec-panel\"
    -DCORE_DEBUG_LEVEL=3